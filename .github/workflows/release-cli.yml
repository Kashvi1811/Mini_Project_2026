name: Build and Release VM CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: vm_cli-windows-x64.zip
          - os: ubuntu-latest
            artifact_name: vm_cli-linux-x64.tar.gz
          - os: macos-latest
            artifact_name: vm_cli-macos.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1


      - name: Copy sample ASM and trace files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item custom_vm_project\sample_*.asm .
          Copy-Item custom_vm_project\trace*.jsonl .

      - name: Build Windows binary and zip with samples
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cl /std:c++17 /EHsc /O2 /nologo custom_vm_project\vm_cli.cpp /Fe:vm_cli.exe
          Compress-Archive -Path vm_cli.exe,sample_*.asm,trace*.jsonl -DestinationPath "${{ matrix.artifact_name }}" -Force

      - name: Copy sample ASM and trace files (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp custom_vm_project/sample_*.asm .
          cp custom_vm_project/trace*.jsonl .

      - name: Build Linux binary and tar with samples
        if: runner.os == 'Linux'
        shell: bash
        run: |
          g++ -std=c++17 -O2 custom_vm_project/vm_cli.cpp -o vm_cli
          chmod +x vm_cli
          tar -czf "${{ matrix.artifact_name }}" vm_cli sample_*.asm trace*.jsonl

      - name: Build macOS binary and tar with samples
        if: runner.os == 'macOS'
        shell: bash
        run: |
          clang++ -std=c++17 -O2 custom_vm_project/vm_cli.cpp -o vm_cli
          chmod +x vm_cli
          tar -czf "${{ matrix.artifact_name }}" vm_cli sample_*.asm trace*.jsonl

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifact
          path: ${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
