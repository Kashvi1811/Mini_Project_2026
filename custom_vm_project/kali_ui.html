<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kali VM App</title>
  <style>
    :root {
      --bg: #070d14;
      --panel: #0b1320;
      --panel2: #0e1724;
      --text: #d6e7ff;
      --muted: #87a3c0;
      --accent: #00cfff;
      --green: #5dff95;
      --border: #1e3042;
      --danger: #ff5f56;
      --warn: #ffbd2e;
      --ok: #27c93f;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: radial-gradient(circle at 85% -10%, #12355d 0%, #070d14 45%, #04070d 100%);
      overflow: hidden;
    }

    .desktop {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 34px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(to bottom, #101b2a, #0a1220);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      font-size: 12px;
      user-select: none;
    }

    .top-left { color: var(--muted); }
    .top-center { color: var(--accent); font-weight: 700; letter-spacing: .3px; }
    .top-right { color: var(--muted); display: flex; align-items: center; gap: 12px; }
    .status-icons { letter-spacing: 1px; font-size: 11px; }

    .workspace {
      flex: 1;
      padding: 16px;
      display: flex;
      gap: 12px;
      min-height: 0;
    }

    .dock {
      width: 82px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 8px;
      background: rgba(7, 16, 26, 0.65);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      box-shadow: inset 0 0 20px rgba(0, 120, 255, 0.08);
    }

    .icon {
      width: 44px;
      height: 44px;
      border: 1px solid #254058;
      border-radius: 11px;
      background: #0c1a2b;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
      transition: .15s ease;
      user-select: none;
    }
    .icon:hover { transform: translateY(-2px); box-shadow: 0 0 16px rgba(0, 207, 255, 0.45); }

    .app-window {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(8, 16, 26, 0.86);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
      position: relative;
    }

    .window-bar {
      height: 36px;
      background: linear-gradient(to bottom, #0f1929, #0a1320);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      cursor: move;
      user-select: none;
    }

    .traffic { display: flex; gap: 8px; }
    .dot { width: 11px; height: 11px; border-radius: 50%; }
    .dot.red { background: var(--danger); }
    .dot.yellow { background: var(--warn); }
    .dot.green { background: var(--ok); }

    .window-title {
      color: var(--muted);
      font-size: 12px;
      font-family: Consolas, 'Courier New', monospace;
    }

    .terminal {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #020a14;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 27px;
    }

    #output {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .line-accent { color: var(--accent); }
    .line-green { color: var(--green); }
    .line-muted { color: var(--muted); }
    .line-boot { color: #73e8ff; }

    .input-wrap {
      border-top: 1px solid var(--border);
      background: #06101c;
      padding: 9px 12px 10px;
    }

    .prompt-line {
      color: #77c4ff;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .prompt { color: var(--green); white-space: nowrap; }

    #cmd {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      outline: none;
      font: inherit;
      caret-color: var(--accent);
    }

    .cursor {
      width: 8px;
      height: 18px;
      background: var(--accent);
      animation: blink 1s step-end infinite;
      border-radius: 1px;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="desktop">
    <div class="topbar">
      <div class="top-left">Applications  Places  Terminal</div>
      <div class="top-center">Kali VM Interface — Custom CPU Lab</div>
      <div class="top-right">
        <span id="clock"></span>
        <span class="status-icons">📶 🔊 🔋</span>
      </div>
    </div>

    <div class="workspace">
      <div class="dock">
        <div class="icon" id="dock-help" title="help">?</div>
        <div class="icon" id="dock-fact" title="factorial">F!</div>
        <div class="icon" id="dock-fib" title="fibonacci">Fn</div>
        <div class="icon" id="dock-asm" title="asm sample">ASM</div>
        <div class="icon" id="dock-trace" title="trace summary">TR</div>
        <div class="icon" id="dock-view" title="viewer">◫</div>
      </div>

      <div class="app-window" id="app-window">
        <div class="window-bar" id="window-bar">
          <div class="traffic">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
          </div>
          <div class="window-title">root@kali: ~/custom_vm_project</div>
        </div>

        <div class="terminal">
          <div id="output"></div>
          <div class="input-wrap">
            <div class="prompt-line">┌──(kashvi㉿kali)-[~/custom_vm_project]</div>
            <div class="input-row">
              <span class="prompt">└─$</span>
              <input id="cmd" autocomplete="off" spellcheck="false" placeholder="Type help" />
              <span class="cursor"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const output = document.getElementById('output');
    const cmdInput = document.getElementById('cmd');
    const MEMORY_SIZE = 1 << 16;
    const MAX_STEPS = 100000;
    const commandHistory = [];
    const virtualBins = new Map();
    const SAMPLE_ASM_ALIASES = {
      fact: 'sample_factorial.asm',
      factorial: 'sample_factorial.asm',
      fib: 'sample_fibonacci.asm',
      fibonacci: 'sample_fibonacci.asm',
      add: 'sample_addition.asm',
      addition: 'sample_addition.asm'
    };

    let historyIndex = -1;
    let lastTrace = [];
    let lastProgramWords = [];
    let lastAsmPath = '';
    let lastAsmSource = '';
    let lastRunLabel = '';

    function writeLine(text = '', cls = '') {
      const line = document.createElement('div');
      if (cls) line.className = cls;
      line.textContent = text;
      output.appendChild(line);
      output.scrollTop = output.scrollHeight;
    }

    function parseIntSafe(s) {
      const n = Number(s);
      if (!Number.isInteger(n)) return null;
      return n;
    }

    function toHex16(value) {
      return `0x${(value & 0xFFFF).toString(16).toUpperCase().padStart(4, '0')}`;
    }

    function freshVm() {
      return {
        memory: new Array(MEMORY_SIZE).fill(0),
        regs: new Array(8).fill(0),
        pc: 0,
        z: 1,
        n: 0,
        p: 0,
      };
    }

    function setFlags(vm, r) {
      if (r === 0) {
        vm.z = 1;
        vm.n = 0;
        vm.p = 0;
        return;
      }
      if ((r >> 15) & 1) {
        vm.z = 0;
        vm.n = 1;
        vm.p = 0;
        return;
      }
      vm.z = 0;
      vm.n = 0;
      vm.p = 1;
    }

    function loadProgramWords(vm, words) {
      vm.memory.fill(0);
      vm.regs.fill(0);
      vm.pc = 0;
      vm.z = 1;
      vm.n = 0;
      vm.p = 0;
      for (let i = 0; i < words.length && i < MEMORY_SIZE; i++) {
        vm.memory[i] = words[i] & 0xFFFF;
      }
    }

    function loadFact(vm, n) {
      n = Math.max(0, Math.min(63, n));
      vm.memory[0] = (6 << 12) | (0 << 9) | 1;
      vm.memory[1] = (6 << 12) | (1 << 9) | n;
      vm.memory[2] = (6 << 12) | (2 << 9) | 3;
      vm.memory[3] = (7 << 12) | (0 << 9) | (1 << 6);
      vm.memory[4] = (8 << 12) | (1 << 9) | 1;
      vm.memory[5] = (4 << 12) | (1 << 9) | 1;
      vm.memory[6] = (5 << 12) | (2 << 9);
      vm.memory[7] = 0;
    }

    function loadFib(vm, steps) {
      steps = Math.max(0, Math.min(63, steps));
      vm.memory[0] = (6 << 12) | (0 << 9) | 0;
      vm.memory[1] = (6 << 12) | (1 << 9) | 1;
      vm.memory[2] = (6 << 12) | (3 << 9) | steps;
      vm.memory[3] = (6 << 12) | (4 << 9) | 7;
      vm.memory[4] = (4 << 12) | (3 << 9) | 12;
      vm.memory[5] = (8 << 12) | (3 << 9) | 1;
      vm.memory[6] = (4 << 12) | (3 << 9) | 10;
      vm.memory[7] = (6 << 12) | (2 << 9) | 0;
      vm.memory[8] = (1 << 12) | (2 << 9) | (0 << 6);
      vm.memory[9] = (1 << 12) | (2 << 9) | (1 << 6);
      vm.memory[10] = (6 << 12) | (0 << 9) | 0;
      vm.memory[11] = (1 << 12) | (0 << 9) | (1 << 6);
      vm.memory[12] = (6 << 12) | (1 << 9) | 0;
      vm.memory[13] = (1 << 12) | (1 << 9) | (2 << 6);
      vm.memory[14] = (8 << 12) | (3 << 9) | 1;
      vm.memory[15] = (4 << 12) | (3 << 9) | 1;
      vm.memory[16] = (5 << 12) | (4 << 9);
      vm.memory[17] = 0;
    }

    function runVm(vm, maxSteps = MAX_STEPS) {
      const trace = [];
      let step = 0;
      while (true) {
        if (step >= maxSteps) {
          return {
            ok: false,
            error: `Execution stopped: max step limit reached (${maxSteps}).`,
            trace,
          };
        }

        const pcBefore = vm.pc & 0xFFFF;
        const ins = vm.memory[pcBefore] & 0xFFFF;
        vm.pc = (vm.pc + 1) & 0xFFFF;
        trace.push({ step, pc: pcBefore, ins, regs: vm.regs.slice() });

        const op = (ins >> 12) & 0xF;
        const rd = (ins >> 9) & 7;
        const rs = (ins >> 6) & 7;
        const imm6 = ins & 0x3F;

        if (op === 0) break;

        switch (op) {
          case 1:
            vm.regs[rd] = (vm.regs[rd] + vm.regs[rs]) & 0xFFFF;
            setFlags(vm, vm.regs[rd]);
            break;
          case 2:
            vm.regs[rd] = vm.regs[rd] & vm.regs[rs];
            setFlags(vm, vm.regs[rd]);
            break;
          case 3:
            vm.regs[rd] = (~vm.regs[rs]) & 0xFFFF;
            setFlags(vm, vm.regs[rd]);
            break;
          case 4:
            if (vm.regs[rd] === 0) vm.pc = (vm.pc + imm6) & 0xFFFF;
            break;
          case 5:
            vm.pc = vm.regs[rd] & 0xFFFF;
            break;
          case 6:
            vm.regs[rd] = imm6;
            setFlags(vm, vm.regs[rd]);
            break;
          case 7:
            vm.regs[rd] = (vm.regs[rd] * vm.regs[rs]) & 0xFFFF;
            setFlags(vm, vm.regs[rd]);
            break;
          case 8:
            vm.regs[rd] = (vm.regs[rd] - imm6) & 0xFFFF;
            setFlags(vm, vm.regs[rd]);
            break;
          case 9:
            vm.memory[imm6] = vm.regs[rd] & 0xFFFF;
            break;
          case 10:
            vm.regs[rd] = vm.memory[imm6] & 0xFFFF;
            setFlags(vm, vm.regs[rd]);
            break;
          default:
            return { ok: false, error: `Unknown opcode ${op}`, trace };
        }
        step += 1;
      }
      return { ok: true, trace };
    }

    function fibSequence(n) {
      n = Math.max(0, Math.min(63, n));
      const seq = [];
      if (n <= 0) return seq;
      let a = 0;
      let b = 1;
      seq.push(a);
      for (let i = 1; i < n; i++) {
        seq.push(b & 0xFFFF);
        const next = (a + b) & 0xFFFF;
        a = b;
        b = next;
      }
      return seq;
    }

    function tokenizeInstruction(line) {
      return line.replace(/,/g, ' ').trim().split(/\s+/).filter(Boolean);
    }

    function stripAsmComments(rawLine) {
      let line = rawLine;
      const slashPos = line.indexOf('//');
      const hashPos = line.indexOf('#');
      let cutPos = -1;
      if (slashPos !== -1) cutPos = slashPos;
      if (hashPos !== -1) cutPos = cutPos === -1 ? hashPos : Math.min(cutPos, hashPos);
      if (cutPos !== -1) line = line.slice(0, cutPos);
      return line.trim();
    }

    function isValidAsmLabel(label) {
      return /^[A-Za-z_][A-Za-z0-9_]*$/.test(label);
    }

    function parseRegister(token) {
      const match = /^R([0-7])$/i.exec(token || '');
      return match ? Number(match[1]) : null;
    }

    function parseImmediateToken(token) {
      if (!/^-?\d+$/.test(token)) return null;
      return Number(token);
    }

    function resolveImmediateToken(token, op, lineNo, currentAddress, labels) {
      const parsed = parseImmediateToken(token);
      if (parsed !== null) {
        if (parsed < 0 || parsed > 63) {
          return { ok: false, error: `Line ${lineNo}: immediate must be in range 0..63.` };
        }
        return { ok: true, imm: parsed };
      }

      if (!labels.has(token)) {
        return { ok: false, error: `Line ${lineNo}: unknown immediate/label "${token}".` };
      }

      const targetAddress = labels.get(token);
      if (op === 'JZ') {
        const relativeOffset = targetAddress - (currentAddress + 1);
        if (relativeOffset < 0 || relativeOffset > 63) {
          return { ok: false, error: `Line ${lineNo}: JZ label "${token}" is out of forward range (0..63).` };
        }
        return { ok: true, imm: relativeOffset };
      }

      if (targetAddress < 0 || targetAddress > 63) {
        return { ok: false, error: `Line ${lineNo}: label address out of range for 6-bit immediate.` };
      }
      return { ok: true, imm: targetAddress };
    }

    function encodeAsmLine(line, lineNo, currentAddress, labels) {
      const p = tokenizeInstruction(line);
      if (p.length === 0) return { ok: false, error: `Line ${lineNo}: empty instruction.` };

      const op = p[0].toUpperCase();
      let rd = 0;
      let rs = 0;
      let imm = 0;
      let opcode = 0;

      if (op === 'HALT') return { ok: true, word: 0 };

      if (op === 'ADD' || op === 'MUL') {
        if (p.length !== 3) return { ok: false, error: `Line ${lineNo}: ${op} expects "${op} Rn, Rm".` };
        rd = parseRegister(p[1]);
        rs = parseRegister(p[2]);
        if (rd === null || rs === null) return { ok: false, error: `Line ${lineNo}: ${op} expects registers R0..R7.` };
        opcode = op === 'ADD' ? 1 : 7;
      } else if (op === 'JMP') {
        if (p.length !== 2) return { ok: false, error: `Line ${lineNo}: JMP expects "JMP Rn".` };
        rd = parseRegister(p[1]);
        if (rd === null) return { ok: false, error: `Line ${lineNo}: JMP expects register R0..R7.` };
        opcode = 5;
      } else if (op === 'LOAD' || op === 'SUB' || op === 'JZ' || op === 'STORE' || op === 'LOADM') {
        if (p.length !== 3) return { ok: false, error: `Line ${lineNo}: ${op} expects "${op} Rn, imm(0-63)".` };
        rd = parseRegister(p[1]);
        if (rd === null) return { ok: false, error: `Line ${lineNo}: ${op} expects register R0..R7.` };

        const resolved = resolveImmediateToken(p[2], op, lineNo, currentAddress, labels);
        if (!resolved.ok) return resolved;
        imm = resolved.imm;

        if (op === 'LOAD') opcode = 6;
        else if (op === 'SUB') opcode = 8;
        else if (op === 'JZ') opcode = 4;
        else if (op === 'STORE') opcode = 9;
        else opcode = 10;
      } else {
        return { ok: false, error: `Line ${lineNo}: unknown instruction "${op}".` };
      }

      const word = ((opcode & 0xF) << 12) | ((rd & 0x7) << 9) | ((rs & 0x7) << 6) | (imm & 0x3F);
      return { ok: true, word };
    }

    function assembleSource(source) {
      const lines = source.split(/\r?\n/);
      const instructionLines = [];
      const labels = new Map();
      let address = 0;

      for (let i = 0; i < lines.length; i++) {
        let line = stripAsmComments(lines[i]);
        if (!line) continue;

        while (true) {
          const colonPos = line.indexOf(':');
          if (colonPos === -1) break;

          const label = line.slice(0, colonPos).trim();
          if (!isValidAsmLabel(label)) {
            return { ok: false, error: `Line ${i + 1}: invalid label name "${label}".` };
          }
          if (labels.has(label)) {
            return { ok: false, error: `Line ${i + 1}: duplicate label "${label}".` };
          }

          labels.set(label, address);
          line = line.slice(colonPos + 1).trim();
          if (!line) break;
        }

        if (!line) continue;
        if (address >= MEMORY_SIZE) return { ok: false, error: 'Program exceeds VM memory capacity.' };

        instructionLines.push({ lineNo: i + 1, text: line, address });
        address += 1;
      }

      const words = [];
      for (const row of instructionLines) {
        const encoded = encodeAsmLine(row.text, row.lineNo, row.address, labels);
        if (!encoded.ok) return encoded;
        words.push(encoded.word & 0xFFFF);
      }

      return { ok: true, words };
    }

    function opcodeName(opcode) {
      const names = {
        0: 'HALT', 1: 'ADD', 2: 'AND', 3: 'NOT', 4: 'JZ',
        5: 'JMP', 6: 'LOAD', 7: 'MUL', 8: 'SUB', 9: 'STORE', 10: 'LOADM'
      };
      return names[opcode] || `OP${opcode}`;
    }

    function printRegs(vm) {
      writeLine(`R0=${vm.regs[0]} R1=${vm.regs[1]} R2=${vm.regs[2]} R3=${vm.regs[3]}`, 'line-muted');
      writeLine(`R4=${vm.regs[4]} R5=${vm.regs[5]} R6=${vm.regs[6]} R7=${vm.regs[7]}  PC=${vm.pc}`, 'line-muted');
    }

    function runWithVm(vm, runLabel, showFibSequenceFor = null) {
      const result = runVm(vm);
      if (!result.ok) {
        writeLine(`error: ${result.error}`);
        return;
      }

      lastTrace = result.trace;
      lastRunLabel = runLabel;

      if (showFibSequenceFor !== null) {
        const seq = fibSequence(showFibSequenceFor);
        writeLine(`Fibonacci sequence (${showFibSequenceFor} terms): [${seq.join(', ')}]`, 'line-green');
      }

      writeLine(`Execution finished for ${runLabel}.`, 'line-green');
      writeLine(`Steps logged: ${lastTrace.length}`, 'line-green');
      printRegs(vm);
    }

    function runProgramWords(words, runLabel) {
      const vm = freshVm();
      loadProgramWords(vm, words);
      lastProgramWords = words.slice();
      runWithVm(vm, runLabel);
    }

    function runFact(n) {
      const clamped = Math.max(0, Math.min(17, n));
      const vm = freshVm();
      loadFact(vm, clamped);
      lastProgramWords = vm.memory.slice(0, 8);
      runWithVm(vm, `fact(${clamped})`);
      if (lastTrace.length > 0) {
        writeLine(`Factorial(${clamped}) = ${vm.regs[0]}`, 'line-green');
      }
    }

    function runFib(n) {
      const clamped = Math.max(0, Math.min(63, n));
      const vm = freshVm();
      loadFib(vm, clamped);
      lastProgramWords = vm.memory.slice(0, 18);
      runWithVm(vm, `fib(${clamped})`, clamped);
      if (lastTrace.length > 0) {
        writeLine(`Final term (R0): ${vm.regs[0]}`, 'line-green');
      }
    }

    function summarizeLastTrace() {
      if (lastTrace.length === 0) {
        writeLine('No trace available yet. Run fact/fib/asm first.');
        return;
      }

      const first = lastTrace[0];
      const last = lastTrace[lastTrace.length - 1];
      const opcodeCounts = new Array(16).fill(0);
      for (const row of lastTrace) {
        opcodeCounts[(row.ins >> 12) & 0xF] += 1;
      }

      const freq = opcodeCounts
        .map((count, op) => ({ op, count }))
        .filter((entry) => entry.count > 0)
        .sort((a, b) => b.count - a.count || a.op - b.op);

      writeLine(`Trace summary (${lastRunLabel || 'last run'}):`, 'line-accent');
      writeLine(`Total logged steps: ${lastTrace.length}`);
      writeLine(`Step range: ${first.step} -> ${last.step}`);
      writeLine(`First PC: ${first.pc}  Last PC: ${last.pc}`);
      writeLine('Register deltas:');

      let anyDelta = false;
      for (let i = 0; i < 8; i++) {
        if (first.regs[i] !== last.regs[i]) {
          writeLine(`  R${i}: ${first.regs[i]} -> ${last.regs[i]}`);
          anyDelta = true;
        }
      }
      if (!anyDelta) writeLine('  (no register changes detected)');

      writeLine('Opcode frequency:');
      for (const item of freq) {
        writeLine(`  ${opcodeName(item.op)} (op=${item.op}): ${item.count}`);
      }
      writeLine(`Last entry: step=${last.step}, pc=${last.pc}, ins=${last.ins}`);
    }

    function showHelp() {
      writeLine('Available commands:', 'line-accent');
      writeLine('help, clear, banner, neofetch, about');
      writeLine('whoami, pwd, ls, cat help, viewer');
      writeLine('fact <n>, fib <n>');
      writeLine('asm-list');
      writeLine('asm-show <fact|fib|add|path.asm|--last>');
      writeLine('asm <fact|fib|add|path.asm|--last>');
      writeLine('asm-build <fact|fib|add|path.asm> [out.bin]');
      writeLine('bins, run-bin <name.bin>, dump-bin <name.bin|--last>');
      writeLine('trace-summary');
      writeLine('');
      writeLine('Note: Browser shell cannot read your local disk files directly.', 'line-muted');
      writeLine('Use project sample ASM files or hosted relative paths.', 'line-muted');
    }

    function banner() {
      writeLine('██╗  ██╗ █████╗ ██╗     ██╗', 'line-accent');
      writeLine('██║ ██╔╝██╔══██╗██║     ██║', 'line-accent');
      writeLine('█████╔╝ ███████║██║     ██║', 'line-accent');
      writeLine('██╔═██╗ ██╔══██║██║     ██║', 'line-accent');
      writeLine('██║  ██╗██║  ██║███████╗██║', 'line-accent');
      writeLine('╚═╝  ╚═╝╚═╝  ╚═╝╚══════╝╚═╝', 'line-accent');
      writeLine('Custom VM Kali-Style Browser CLI');
    }

    function neoFetch() {
      writeLine('kashvi@kali', 'line-accent');
      writeLine('OS: Browser-hosted Kali-like shell');
      writeLine('Kernel: VM-Engine 16-bit ISA');
      writeLine('Shell: custom_vm_web_shell');
      writeLine('Packages: vm, assembler, virtual-bin, viewer');
      writeLine('Theme: Cyber Blue');
    }

    function about() {
      writeLine('Custom VM Browser CLI', 'line-accent');
      writeLine('- GitHub Pages friendly terminal experience');
      writeLine('- VM presets + ASM assemble/run in browser');
      writeLine('- In-memory trace and virtual bin commands');
    }

    function listVirtualBins() {
      if (virtualBins.size === 0) {
        writeLine('No virtual bins yet. Run: asm-build <sample> [out.bin]');
        return;
      }
      writeLine('Virtual bins:', 'line-accent');
      for (const [name, words] of virtualBins.entries()) {
        writeLine(`  ${name} (${words.length} words)`);
      }
    }

    function makeDefaultBinName(pathLike) {
      const normalized = String(pathLike || 'program').split('/').pop().split('\\').pop();
      const dot = normalized.lastIndexOf('.');
      const stem = dot > 0 ? normalized.slice(0, dot) : normalized;
      return `${stem || 'program'}.bin`;
    }

    async function resolveAsmSource(ref) {
      if (ref === '--last') {
        if (!lastAsmSource) {
          return { ok: false, error: 'No previous ASM source available.' };
        }
        return { ok: true, source: lastAsmSource, sourcePath: lastAsmPath || '--last' };
      }

      const key = String(ref || '').toLowerCase();
      const mapped = SAMPLE_ASM_ALIASES[key] || ref;
      const candidates = [mapped, `./${mapped}`];

      for (const candidate of candidates) {
        try {
          const resp = await fetch(candidate, { cache: 'no-store' });
          if (!resp.ok) continue;
          const source = await resp.text();
          return { ok: true, source, sourcePath: candidate.replace(/^\.\//, '') };
        } catch (err) {
          // Try the next candidate path.
        }
      }

      return {
        ok: false,
        error: `Unable to fetch ASM source: ${ref}. Use asm-list to see available samples.`
      };
    }

    async function runAsmCommand(sourceRef) {
      const loaded = await resolveAsmSource(sourceRef);
      if (!loaded.ok) {
        writeLine(`error: ${loaded.error}`);
        return;
      }

      lastAsmPath = loaded.sourcePath;
      lastAsmSource = loaded.source;

      const assembled = assembleSource(loaded.source);
      if (!assembled.ok) {
        writeLine(`error: ${assembled.error}`);
        return;
      }

      writeLine(`Assembled ${assembled.words.length} words from ${loaded.sourcePath}.`, 'line-accent');
      runProgramWords(assembled.words, `asm:${loaded.sourcePath}`);
    }

    async function showAsmSourceCommand(sourceRef) {
      const loaded = await resolveAsmSource(sourceRef);
      if (!loaded.ok) {
        writeLine(`error: ${loaded.error}`);
        return;
      }

      lastAsmPath = loaded.sourcePath;
      lastAsmSource = loaded.source;
      writeLine(`ASM Source (${loaded.sourcePath}):`, 'line-accent');

      const lines = loaded.source.split(/\r?\n/);
      for (let i = 0; i < lines.length; i++) {
        writeLine(`${String(i + 1).padStart(3, ' ')} | ${lines[i]}`);
      }
    }

    async function asmBuildCommand(sourceRef, outBinArg) {
      const loaded = await resolveAsmSource(sourceRef);
      if (!loaded.ok) {
        writeLine(`error: ${loaded.error}`);
        return;
      }

      lastAsmPath = loaded.sourcePath;
      lastAsmSource = loaded.source;

      const assembled = assembleSource(loaded.source);
      if (!assembled.ok) {
        writeLine(`error: ${assembled.error}`);
        return;
      }

      const outBin = outBinArg || makeDefaultBinName(loaded.sourcePath);
      virtualBins.set(outBin, assembled.words.slice());
      lastProgramWords = assembled.words.slice();
      writeLine(`Built ${outBin} (${assembled.words.length} words) in browser memory.`, 'line-green');
    }

    function dumpProgramWords(words, label) {
      if (!words || words.length === 0) {
        writeLine(`No instructions found in ${label}.`);
        return;
      }

      writeLine(`Binary dump: ${label}`, 'line-accent');
      writeLine(`Instruction words: ${words.length}`);
      for (let i = 0; i < words.length; i++) {
        writeLine(`  [${i}] = ${words[i]} (${toHex16(words[i])})`);
      }
    }

    async function execCommand(input) {
      const raw = input.trim();
      if (!raw) return;

      commandHistory.push(raw);
      historyIndex = commandHistory.length;

      writeLine(`└─$ ${raw}`, 'line-muted');
      const parts = raw.split(/\s+/);
      const cmd = parts[0].toLowerCase();

      if (cmd === 'help') return showHelp();
      if (cmd === 'clear') {
        output.innerHTML = '';
        return;
      }
      if (cmd === 'banner') return banner();
      if (cmd === 'about') return about();
      if (cmd === 'neofetch') return neoFetch();
      if (cmd === 'whoami') {
        writeLine('kashvi');
        return;
      }
      if (cmd === 'pwd') {
        writeLine('/home/kashvi/custom_vm_project');
        return;
      }
      if (cmd === 'ls') {
        const binHint = virtualBins.size > 0 ? `  virtual_bins(${virtualBins.size})` : '';
        writeLine(`vm_cli.cpp  vm.cpp  viewer.html  kali_ui.html  sample_factorial.asm  sample_fibonacci.asm  sample_addition.asm${binHint}`);
        return;
      }
      if (cmd === 'cat' && (parts[1] || '').toLowerCase() === 'help') {
        showHelp();
        return;
      }

      if (cmd === 'fact') {
        const n = parseIntSafe(parts[1]);
        if (n === null) {
          writeLine('usage: fact <n>');
          return;
        }
        return runFact(n);
      }

      if (cmd === 'fib') {
        const n = parseIntSafe(parts[1]);
        if (n === null) {
          writeLine('usage: fib <n>');
          return;
        }
        return runFib(n);
      }

      if (cmd === 'asm-list') {
        writeLine('Built-in ASM aliases:', 'line-accent');
        writeLine('  fact -> sample_factorial.asm');
        writeLine('  fib  -> sample_fibonacci.asm');
        writeLine('  add  -> sample_addition.asm');
        return;
      }

      if (cmd === 'asm-show') {
        if (!parts[1]) {
          writeLine('usage: asm-show <fact|fib|add|path.asm|--last>');
          return;
        }
        return showAsmSourceCommand(parts[1]);
      }

      if (cmd === 'asm') {
        if (!parts[1]) {
          writeLine('usage: asm <fact|fib|add|path.asm|--last>');
          return;
        }
        return runAsmCommand(parts[1]);
      }

      if (cmd === 'asm-build') {
        if (!parts[1]) {
          writeLine('usage: asm-build <fact|fib|add|path.asm> [out.bin]');
          return;
        }
        return asmBuildCommand(parts[1], parts[2]);
      }

      if (cmd === 'bins') {
        listVirtualBins();
        return;
      }

      if (cmd === 'run-bin') {
        if (!parts[1]) {
          writeLine('usage: run-bin <name.bin>');
          return;
        }
        const bin = virtualBins.get(parts[1]);
        if (!bin) {
          writeLine(`error: virtual bin not found: ${parts[1]}`);
          writeLine('Tip: asm-build <sample> [name.bin], then run-bin <name.bin>');
          return;
        }
        return runProgramWords(bin, `bin:${parts[1]}`);
      }

      if (cmd === 'dump-bin') {
        if (!parts[1]) {
          writeLine('usage: dump-bin <name.bin|--last>');
          return;
        }
        if (parts[1] === '--last') {
          dumpProgramWords(lastProgramWords, 'last-program');
          return;
        }
        const bin = virtualBins.get(parts[1]);
        if (!bin) {
          writeLine(`error: virtual bin not found: ${parts[1]}`);
          return;
        }
        dumpProgramWords(bin, parts[1]);
        return;
      }

      if (cmd === 'trace-summary') {
        summarizeLastTrace();
        return;
      }

      if (cmd === 'viewer') {
        window.open('viewer.html', '_blank');
        writeLine('Opening viewer.html ...', 'line-green');
        return;
      }

      writeLine(`unknown command: ${cmd}`);
    }

    cmdInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        void execCommand(cmdInput.value);
        cmdInput.value = '';
      } else if (e.key === 'ArrowUp') {
        if (historyIndex > 0) {
          historyIndex -= 1;
          cmdInput.value = commandHistory[historyIndex] || '';
          e.preventDefault();
        }
      } else if (e.key === 'ArrowDown') {
        if (historyIndex < commandHistory.length - 1) {
          historyIndex += 1;
          cmdInput.value = commandHistory[historyIndex] || '';
        } else {
          historyIndex = commandHistory.length;
          cmdInput.value = '';
        }
        e.preventDefault();
      }
    });

    document.getElementById('dock-help').onclick = () => { void execCommand('help'); };
    document.getElementById('dock-fact').onclick = () => { void execCommand('fact 5'); };
    document.getElementById('dock-fib').onclick = () => { void execCommand('fib 8'); };
    document.getElementById('dock-asm').onclick = () => { void execCommand('asm fact'); };
    document.getElementById('dock-trace').onclick = () => { void execCommand('trace-summary'); };
    document.getElementById('dock-view').onclick = () => { void execCommand('viewer'); };

    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString();
    }, 1000);
    document.getElementById('clock').textContent = new Date().toLocaleTimeString();

    const appWindow = document.getElementById('app-window');
    const windowBar = document.getElementById('window-bar');
    let drag = false;
    let dragX = 0;
    let dragY = 0;
    let startLeft = 0;
    let startTop = 0;

    function ensureAbsolutePosition() {
      if (getComputedStyle(appWindow).position !== 'absolute') {
        const rect = appWindow.getBoundingClientRect();
        appWindow.style.position = 'absolute';
        appWindow.style.left = `${rect.left}px`;
        appWindow.style.top = `${rect.top}px`;
        appWindow.style.width = `${rect.width}px`;
        appWindow.style.height = `${rect.height}px`;
      }
    }

    windowBar.addEventListener('mousedown', (e) => {
      if (e.target.classList.contains('dot')) return;
      ensureAbsolutePosition();
      drag = true;
      dragX = e.clientX;
      dragY = e.clientY;
      startLeft = parseFloat(appWindow.style.left || '0');
      startTop = parseFloat(appWindow.style.top || '0');
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!drag) return;
      const dx = e.clientX - dragX;
      const dy = e.clientY - dragY;
      appWindow.style.left = `${startLeft + dx}px`;
      appWindow.style.top = `${startTop + dy}px`;
    });

    document.addEventListener('mouseup', () => {
      drag = false;
    });

    function bootSequence() {
      writeLine('[ OK ] Initializing Custom VM kernel', 'line-boot');
      writeLine('[ OK ] Loading ISA table', 'line-boot');
      writeLine('[ OK ] Registering shell commands', 'line-boot');
      writeLine('[ OK ] Starting browser CLI terminal', 'line-boot');
      writeLine('');
    }

    bootSequence();
    banner();
    showHelp();
    cmdInput.focus();
  </script>
</body>
