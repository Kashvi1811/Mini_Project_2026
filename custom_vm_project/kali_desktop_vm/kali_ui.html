<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kali VM App</title>
  <style>
    :root {
      --bg: #070d14;
      --panel: #0b1320;
      --panel2: #0e1724;
      --text: #d6e7ff;
      --muted: #87a3c0;
      --accent: #00cfff;
      --green: #5dff95;
      --border: #1e3042;
      --danger: #ff5f56;
      --warn: #ffbd2e;
      --ok: #27c93f;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: radial-gradient(circle at 85% -10%, #12355d 0%, #070d14 45%, #04070d 100%);
      overflow: hidden;
    }

    .desktop {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 34px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(to bottom, #101b2a, #0a1220);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      font-size: 12px;
      user-select: none;
    }

    .top-left { color: var(--muted); }
    .top-center { color: var(--accent); font-weight: 700; letter-spacing: .3px; }
    .top-right { color: var(--muted); display: flex; align-items: center; gap: 12px; }
    .status-icons { letter-spacing: 1px; font-size: 11px; }

    .workspace {
      flex: 1;
      padding: 16px;
      display: flex;
      gap: 12px;
      min-height: 0;
    }

    .dock {
      width: 82px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 8px;
      background: rgba(7, 16, 26, 0.65);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      box-shadow: inset 0 0 20px rgba(0, 120, 255, 0.08);
    }

    .icon {
      width: 44px;
      height: 44px;
      border: 1px solid #254058;
      border-radius: 11px;
      background: #0c1a2b;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
      transition: .15s ease;
      user-select: none;
    }
    .icon:hover { transform: translateY(-2px); box-shadow: 0 0 16px rgba(0, 207, 255, 0.45); }

    .app-window {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(8, 16, 26, 0.86);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
      position: relative;
    }

    .window-bar {
      height: 36px;
      background: linear-gradient(to bottom, #0f1929, #0a1320);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      cursor: move;
      user-select: none;
    }

    .traffic { display: flex; gap: 8px; }
    .dot { width: 11px; height: 11px; border-radius: 50%; }
    .dot.red { background: var(--danger); }
    .dot.yellow { background: var(--warn); }
    .dot.green { background: var(--ok); }

    .window-title {
      color: var(--muted);
      font-size: 12px;
      font-family: Consolas, 'Courier New', monospace;
    }

    .terminal {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #020a14;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 27px;
    }

    #output {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .line-accent { color: var(--accent); }
    .line-green { color: var(--green); }
    .line-muted { color: var(--muted); }
    .line-boot { color: #73e8ff; }

    .input-wrap {
      border-top: 1px solid var(--border);
      background: #06101c;
      padding: 9px 12px 10px;
    }

    .prompt-line {
      color: #77c4ff;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .prompt { color: var(--green); white-space: nowrap; }

    #cmd {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      outline: none;
      font: inherit;
      caret-color: var(--accent);
    }

    .cursor {
      width: 8px;
      height: 18px;
      background: var(--accent);
      animation: blink 1s step-end infinite;
      border-radius: 1px;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="desktop">
    <div class="topbar">
      <div class="top-left">Applications  Places  Terminal</div>
      <div class="top-center">Kali VM Interface — Custom CPU Lab</div>
      <div class="top-right">
        <span id="clock"></span>
        <span class="status-icons">📶 🔊 🔋</span>
      </div>
    </div>

    <div class="workspace">
      <div class="dock">
        <div class="icon" id="dock-help" title="help">?</div>
        <div class="icon" id="dock-fact" title="factorial">F!</div>
        <div class="icon" id="dock-fib" title="fibonacci">Fn</div>
        <div class="icon" id="dock-view" title="viewer">◫</div>
      </div>

      <div class="app-window" id="app-window">
        <div class="window-bar" id="window-bar">
          <div class="traffic">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
          </div>
          <div class="window-title">root@kali: ~/custom_vm_project</div>
        </div>

        <div class="terminal">
          <div id="output"></div>
          <div class="input-wrap">
            <div class="prompt-line">┌──(kashvi㉿kali)-[~/custom_vm_project]</div>
            <div class="input-row">
              <span class="prompt">└─$</span>
              <input id="cmd" autocomplete="off" spellcheck="false" placeholder="Type help" />
              <span class="cursor"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const output = document.getElementById('output');
    const cmdInput = document.getElementById('cmd');
    const MEMORY_SIZE = 1 << 16;
    const commandHistory = [];
    let historyIndex = -1;

    function writeLine(text = '', cls = '') {
      const line = document.createElement('div');
      if (cls) line.className = cls;
      line.textContent = text;
      output.appendChild(line);
      output.scrollTop = output.scrollHeight;
    }

    function parseIntSafe(s) {
      const n = Number(s);
      if (!Number.isInteger(n)) return null;
      return n;
    }

    function freshVm() {
      return {
        memory: new Array(MEMORY_SIZE).fill(0),
        regs: new Array(8).fill(0),
        pc: 0,
        z: 1,
        n: 0,
        p: 0,
      };
    }

    function setFlags(vm, r) {
      if (r === 0) { vm.z = 1; vm.n = 0; vm.p = 0; return; }
      if ((r >> 15) & 1) { vm.z = 0; vm.n = 1; vm.p = 0; return; }
      vm.z = 0; vm.n = 0; vm.p = 1;
    }

    function loadFact(vm, n) {
      n = Math.max(0, Math.min(63, n));
      vm.memory[0] = (6 << 12) | (0 << 9) | 1;
      vm.memory[1] = (6 << 12) | (1 << 9) | n;
      vm.memory[2] = (6 << 12) | (2 << 9) | 3;
      vm.memory[3] = (7 << 12) | (0 << 9) | (1 << 6);
      vm.memory[4] = (8 << 12) | (1 << 9) | 1;
      vm.memory[5] = (4 << 12) | (1 << 9) | 1;
      vm.memory[6] = (5 << 12) | (2 << 9);
      vm.memory[7] = 0;
    }

    function loadFib(vm, steps) {
      steps = Math.max(0, Math.min(63, steps));
      vm.memory[0] = (6 << 12) | (0 << 9) | 0;
      vm.memory[1] = (6 << 12) | (1 << 9) | 1;
      vm.memory[2] = (6 << 12) | (3 << 9) | steps;
      vm.memory[3] = (6 << 12) | (4 << 9) | 7;
      vm.memory[4] = (4 << 12) | (3 << 9) | 12;
      vm.memory[5] = (8 << 12) | (3 << 9) | 1;
      vm.memory[6] = (4 << 12) | (3 << 9) | 10;
      vm.memory[7] = (6 << 12) | (2 << 9) | 0;
      vm.memory[8] = (1 << 12) | (2 << 9) | (0 << 6);
      vm.memory[9] = (1 << 12) | (2 << 9) | (1 << 6);
      vm.memory[10] = (6 << 12) | (0 << 9) | 0;
      vm.memory[11] = (1 << 12) | (0 << 9) | (1 << 6);
      vm.memory[12] = (6 << 12) | (1 << 9) | 0;
      vm.memory[13] = (1 << 12) | (1 << 9) | (2 << 6);
      vm.memory[14] = (8 << 12) | (3 << 9) | 1;
      vm.memory[15] = (4 << 12) | (3 << 9) | 1;
      vm.memory[16] = (5 << 12) | (4 << 9);
      vm.memory[17] = 0;
    }

    function runVm(vm, maxSteps = 100000) {
      let steps = 0;
      while (true) {
        if (steps >= maxSteps) return { ok: false, error: 'Step limit reached.' };
        const ins = vm.memory[vm.pc++];
        const op = (ins >> 12) & 0xF;
        const rd = (ins >> 9) & 7;
        const rs = (ins >> 6) & 7;
        const imm6 = ins & 0x3F;

        if (op === 0) break;

        switch (op) {
          case 1: vm.regs[rd] = (vm.regs[rd] + vm.regs[rs]) & 0xFFFF; setFlags(vm, vm.regs[rd]); break;
          case 4: if (vm.regs[rd] === 0) vm.pc = (vm.pc + imm6) & 0xFFFF; break;
          case 5: vm.pc = vm.regs[rd] & 0xFFFF; break;
          case 6: vm.regs[rd] = imm6; setFlags(vm, vm.regs[rd]); break;
          case 7: vm.regs[rd] = (vm.regs[rd] * vm.regs[rs]) & 0xFFFF; setFlags(vm, vm.regs[rd]); break;
          case 8: vm.regs[rd] = (vm.regs[rd] - imm6) & 0xFFFF; setFlags(vm, vm.regs[rd]); break;
          case 9: vm.memory[imm6] = vm.regs[rd] & 0xFFFF; break;
          case 10: vm.regs[rd] = vm.memory[imm6] & 0xFFFF; setFlags(vm, vm.regs[rd]); break;
          default: return { ok: false, error: `Unknown opcode ${op}` };
        }
        steps++;
      }
      return { ok: true };
    }

    function fibSequence(n) {
      n = Math.max(0, Math.min(63, n));
      const seq = [];
      if (n <= 0) return seq;
      let a = 0, b = 1;
      seq.push(a);
      for (let i = 1; i < n; i++) {
        seq.push(b & 0xFFFF);
        const next = (a + b) & 0xFFFF;
        a = b;
        b = next;
      }
      return seq;
    }

    function printRegs(vm) {
      writeLine(`R0=${vm.regs[0]} R1=${vm.regs[1]} R2=${vm.regs[2]} R3=${vm.regs[3]}`, 'line-muted');
      writeLine(`R4=${vm.regs[4]} R5=${vm.regs[5]} R6=${vm.regs[6]} R7=${vm.regs[7]}  PC=${vm.pc}`, 'line-muted');
    }

    function runFact(n) {
      const vm = freshVm();
      loadFact(vm, n);
      const result = runVm(vm);
      if (!result.ok) {
        writeLine(`error: ${result.error}`);
        return;
      }
      const clamped = Math.max(0, Math.min(63, n));
      writeLine(`Factorial(${clamped}) = ${vm.regs[0]}`, 'line-green');
      printRegs(vm);
    }

    function runFib(n) {
      const vm = freshVm();
      loadFib(vm, n);
      const result = runVm(vm);
      if (!result.ok) {
        writeLine(`error: ${result.error}`);
        return;
      }
      const clamped = Math.max(0, Math.min(63, n));
      const seq = fibSequence(clamped);
      writeLine(`Fibonacci sequence (${clamped} terms): [${seq.join(', ')}]`, 'line-green');
      writeLine(`Final term (R0): ${vm.regs[0]}`, 'line-green');
      printRegs(vm);
    }

    function showHelp() {
      writeLine('Available commands:', 'line-accent');
      writeLine('help, clear, banner, neofetch');
      writeLine('whoami, pwd, ls, cat help');
      writeLine('fact <n>, fib <n>, viewer, about');
    }

    function banner() {
      writeLine('██╗  ██╗ █████╗ ██╗     ██╗', 'line-accent');
      writeLine('██║ ██╔╝██╔══██╗██║     ██║', 'line-accent');
      writeLine('█████╔╝ ███████║██║     ██║', 'line-accent');
      writeLine('██╔═██╗ ██╔══██║██║     ██║', 'line-accent');
      writeLine('██║  ██╗██║  ██║███████╗██║', 'line-accent');
      writeLine('╚═╝  ╚═╝╚═╝  ╚═╝╚══════╝╚═╝', 'line-accent');
      writeLine('Custom VM Kali-Style App');
    }

    function neoFetch() {
      writeLine('kashvi@kali', 'line-accent');
      writeLine('OS: Kali-like Custom VM UI');
      writeLine('Kernel: VM-Engine 16-bit ISA');
      writeLine('Shell: custom_vm_shell');
      writeLine('Packages: vm_cli, viewer, assembler, run-bin');
      writeLine('Theme: Cyber Blue');
    }

    function about() {
      writeLine('Custom VM Project Frontend', 'line-accent');
      writeLine('- Kali-like desktop shell interface');
      writeLine('- VM commands: fact/fib');
      writeLine('- Educational CPU simulation project');
    }

    function execCommand(input) {
      const raw = input.trim();
      if (!raw) return;

      commandHistory.push(raw);
      historyIndex = commandHistory.length;

      writeLine(`└─$ ${raw}`, 'line-muted');
      const parts = raw.split(/\s+/);
      const cmd = parts[0].toLowerCase();

      if (cmd === 'help') return showHelp();
      if (cmd === 'clear') { output.innerHTML = ''; return; }
      if (cmd === 'banner') return banner();
      if (cmd === 'about') return about();
      if (cmd === 'neofetch') return neoFetch();
      if (cmd === 'whoami') { writeLine('kashvi'); return; }
      if (cmd === 'pwd') { writeLine('/home/kashvi/custom_vm_project'); return; }
      if (cmd === 'ls') {
        writeLine('vm_cli.cpp  vm.cpp  viewer.html  kali_ui.html  sample_factorial.asm  sample_fibonacci.asm');
        return;
      }
      if (cmd === 'cat' && (parts[1] || '').toLowerCase() === 'help') {
        showHelp();
        return;
      }

      if (cmd === 'fact') {
        const n = parseIntSafe(parts[1]);
        if (n === null) { writeLine('usage: fact <n>'); return; }
        return runFact(n);
      }

      if (cmd === 'fib') {
        const n = parseIntSafe(parts[1]);
        if (n === null) { writeLine('usage: fib <n>'); return; }
        return runFib(n);
      }

      if (cmd === 'viewer') {
        window.open('viewer.html', '_blank');
        writeLine('Opening viewer.html ...', 'line-green');
        return;
      }

      writeLine(`unknown command: ${cmd}`);
    }

    cmdInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        execCommand(cmdInput.value);
        cmdInput.value = '';
      } else if (e.key === 'ArrowUp') {
        if (historyIndex > 0) {
          historyIndex -= 1;
          cmdInput.value = commandHistory[historyIndex] || '';
          e.preventDefault();
        }
      } else if (e.key === 'ArrowDown') {
        if (historyIndex < commandHistory.length - 1) {
          historyIndex += 1;
          cmdInput.value = commandHistory[historyIndex] || '';
        } else {
          historyIndex = commandHistory.length;
          cmdInput.value = '';
        }
        e.preventDefault();
      }
    });

    document.getElementById('dock-help').onclick = () => execCommand('help');
    document.getElementById('dock-fact').onclick = () => execCommand('fact 5');
    document.getElementById('dock-fib').onclick = () => execCommand('fib 8');
    document.getElementById('dock-view').onclick = () => execCommand('viewer');

    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString();
    }, 1000);
    document.getElementById('clock').textContent = new Date().toLocaleTimeString();

    const appWindow = document.getElementById('app-window');
    const windowBar = document.getElementById('window-bar');
    let drag = false;
    let dragX = 0;
    let dragY = 0;
    let startLeft = 0;
    let startTop = 0;

    function ensureAbsolutePosition() {
      if (getComputedStyle(appWindow).position !== 'absolute') {
        const rect = appWindow.getBoundingClientRect();
        appWindow.style.position = 'absolute';
        appWindow.style.left = rect.left + 'px';
        appWindow.style.top = rect.top + 'px';
        appWindow.style.width = rect.width + 'px';
        appWindow.style.height = rect.height + 'px';
      }
    }

    windowBar.addEventListener('mousedown', (e) => {
      if (e.target.classList.contains('dot')) return;
      ensureAbsolutePosition();
      drag = true;
      dragX = e.clientX;
      dragY = e.clientY;
      startLeft = parseFloat(appWindow.style.left || '0');
      startTop = parseFloat(appWindow.style.top || '0');
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!drag) return;
      const dx = e.clientX - dragX;
      const dy = e.clientY - dragY;
      appWindow.style.left = (startLeft + dx) + 'px';
      appWindow.style.top = (startTop + dy) + 'px';
    });

    document.addEventListener('mouseup', () => {
      drag = false;
    });

    function bootSequence() {
      writeLine('[ OK ] Initializing Custom VM kernel', 'line-boot');
      writeLine('[ OK ] Loading ISA table', 'line-boot');
      writeLine('[ OK ] Registering shell commands', 'line-boot');
      writeLine('[ OK ] Starting kali_ui terminal', 'line-boot');
      writeLine('');
    }

    bootSequence();
    banner();
    showHelp();
    cmdInput.focus();
  </script>
</body>
</html>
